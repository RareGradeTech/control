<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        /* Chrome-like Dark Theme */
        :root {
            --bg-color: #202124;
            --card-bg: #323639;
            --card-hover: #3c4043;
            --text-color: #e8eaed;
            --secondary-text: #9aa0a6;
            --accent: #8ab4f8;
            --danger: #f28b82;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 8vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
        }

        /* Search / Input Area */
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
        }

        input {
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px solid #5f6368;
            background: var(--bg-color);
            color: var(--text-color);
            outline: none;
            flex: 1;
            max-width: 250px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            padding: 12px 24px;
            background-color: var(--accent);
            color: #202124;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        /* Grid & Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-color);
            position: relative;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .card:hover {
            background-color: var(--card-hover);
            transform: scale(1.02);
        }

        /* Generates a quick initial based on the site name */
        .card-icon {
            background-color: #5f6368;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .card-title {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90%;
        }

        /* Delete Button */
        .delete-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            background-color: var(--card-bg);
            color: var(--secondary-text);
            border: 1px solid #5f6368;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            opacity: 0;
            padding: 0;
            transition: opacity 0.2s, color 0.2s;
        }

        .card:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: var(--danger);
            border-color: var(--danger);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="controls">
            <input type="text" id="siteName" placeholder="Name (e.g. GitHub)" autocomplete="off">
            <input type="text" id="siteUrl" placeholder="URL (e.g. github.com)" autocomplete="off">
            <button onclick="addCard()">Add Shortcut</button>
        </div>

        <div class="grid" id="grid">
            </div>
    </div>

    <script>
        // Initialize with some default cards if localStorage is empty
        let cards = JSON.parse(localStorage.getItem('chromeCards')) || [
            { name: 'Google', url: 'https://google.com' },
            { name: 'YouTube', url: 'https://youtube.com' }
        ];

        const grid = document.getElementById('grid');
        const nameInput = document.getElementById('siteName');
        const urlInput = document.getElementById('siteUrl');

        // Render the cards to the screen
        function renderCards() {
            grid.innerHTML = '';
            
            cards.forEach((card, index) => {
                // Create the clickable link wrapper
                const a = document.createElement('a');
                a.className = 'card';
                a.href = card.url;
                
                // Get the first letter for the icon
                const initial = card.name.charAt(0).toUpperCase();

                // Build the inner HTML
                a.innerHTML = `
                    <div class="card-icon">${initial}</div>
                    <div class="card-title">${card.name}</div>
                `;

                // Create the delete button
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '×';
                
                // Stop the link from opening when clicking the delete button
                delBtn.onclick = (e) => {
                    e.preventDefault(); 
                    deleteCard(index);
                };

                a.appendChild(delBtn);
                grid.appendChild(a);
            });
        }

        // Add a new card
        function addCard() {
            const name = nameInput.value.trim();
            let url = urlInput.value.trim();

            if (!name || !url) {
                alert('Please enter both a name and a URL.');
                return;
            }

            // Ensure the URL has http:// or https:// so it routes correctly
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            // Add to array, save, and update UI
            cards.push({ name, url });
            saveData();
            renderCards();

            // Clear inputs
            nameInput.value = '';
            urlInput.value = '';
            nameInput.focus();
        }

        // Delete a card
        function deleteCard(index) {
            cards.splice(index, 1);
            saveData();
            renderCards();
        }

        // Save array to local storage
        function saveData() {
            localStorage.setItem('chromeCards', JSON.stringify(cards));
        }

        // Allow pressing "Enter" in the URL field to add the card
        urlInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addCard();
            }
        });

        // Initial render on page load
        renderCards();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pro + Ona AI</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-remote-config-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #f8f9fa;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-color: #202124;
            --secondary-text: #5f6368;
            --accent: #1a73e8;
            --danger: #ea4335;
            --border-color: #dadce0;
            --radius: 16px;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-color: #1a1c1e;
            --sidebar-bg: #212327;
            --card-bg: #2d2f33;
            --text-color: #e2e2e6;
            --secondary-text: #909094;
            --border-color: #44474a;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: 0.3s ease;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 72px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            z-index: 100;
        }

        .sidebar:hover { width: 240px; box-shadow: 10px 0 30px rgba(0,0,0,0.05); }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            color: var(--secondary-text);
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
            text-decoration: none;
        }

        .nav-item:hover { background: rgba(26, 115, 232, 0.1); color: var(--accent); }
        .nav-item svg { width: 24px; height: 24px; min-width: 24px; margin-right: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
        .nav-text { opacity: 0; transition: 0.3s; font-weight: 500; }
        .sidebar:hover .nav-text { opacity: 1; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .controls {
            background: var(--card-bg);
            padding: 15px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            box-shadow: var(--shadow);
        }

        input {
            padding: 12px 18px;
            border-radius: 25px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            outline: none;
            flex: 1;
        }

        button.btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        /* --- GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            transition: 0.3s;
            position: relative;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .card-icon {
            width: 50px; height: 50px; background: var(--bg-color);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 10px; font-size: 20px;
            border: 1px solid var(--border-color);
        }

        /* --- AI FLOATING WIDGET --- */
        .ai-fab {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, #C5A059, #8E6E37);
            border: none; cursor: pointer; color: white;
            box-shadow: 0 8px 24px rgba(197, 160, 89, 0.4);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; transition: 0.3s;
        }

        .ai-fab:hover { transform: scale(1.1) rotate(5deg); }

        .ai-window {
            position: fixed; bottom: 100px; right: 30px;
            width: 380px; height: 550px; background: var(--card-bg);
            border: 1px solid var(--border-color); border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: none; flex-direction: column; overflow: hidden; z-index: 1000;
        }

        .ai-window.active { display: flex; animation: slideUp 0.3s ease; }

        .ai-header { background: #C5A059; color: white; padding: 20px; font-weight: bold; display: flex; justify-content: space-between; }

        .chat-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .bubble.user { background: var(--accent); color: white; align-self: flex-end; }
        .bubble.ai { background: var(--bg-color); border: 1px solid var(--border-color); align-self: flex-start; }

        .ai-input-area { padding: 15px; border-top: 1px solid var(--border-color); display: flex; gap: 8px; }

        /* Loader */
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="padding: 20px 24px; color: var(--accent);">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <a href="#" class="nav-item">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span class="nav-text">Dashboard</span>
        </a>
        <a href="#" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
            <span class="nav-text">Notes</span>
        </a>
        <a href="#" class="nav-item" id="themeToggle">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line></svg>
            <span class="nav-text">Appearance</span>
        </a>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1>My Shortcuts</h1>
            <div class="controls">
                <input type="text" id="siteName" placeholder="Site Name">
                <input type="text" id="siteUrl" placeholder="URL">
                <button class="btn-primary" id="addCardBtn">Add</button>
            </div>
        </div>

        <div class="grid" id="grid">
            </div>
    </main>

    <button class="ai-fab" id="aiFab">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </button>

    <div class="ai-window" id="aiWindow">
        <div class="ai-header">
            <span>Ona AI</span>
            <span style="cursor:pointer" id="closeAi">×</span>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="bubble ai">Hi! I'm Ona. How can I help you with your dashboard today?</div>
        </div>
        <div class="ai-input-area">
            <input type="text" id="aiInput" placeholder="Ask AI...">
            <button class="btn-primary" id="aiSend">Send</button>
        </div>
    </div>

    <script>
        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCh7Ute6LeSAxcNDEQwZg5m0cA4ujnLCfg",
            authDomain: "test-17881.firebaseapp.com",
            databaseURL: "https://test-17881-default-rtdb.firebaseio.com",
            projectId: "test-17881",
            appId: "1:1057428047643:web:f3801c0d933225a5cd35be"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const remoteConfig = firebase.remoteConfig();
        remoteConfig.settings.minimumFetchIntervalMillis = 3600000;

        let XAI_API_KEY = "";

        // Fetch Remote Config for AI
        async function initAI() {
            try {
                await remoteConfig.fetchAndActivate();
                XAI_API_KEY = remoteConfig.getValue('xai_api_key').asString();
            } catch (err) { console.error("Remote Config Error", err); }
        }
        initAI();

        // --- DASHBOARD LOGIC ---
        const grid = document.getElementById('grid');
        db.ref('shortcuts').on('value', snap => {
            grid.innerHTML = '';
            const data = snap.val();
            if (data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    const card = document.createElement('a');
                    card.className = 'card';
                    card.href = item.url;
                    card.target = "_blank";
                    card.innerHTML = `
                        <div class="card-icon">${item.name[0].toUpperCase()}</div>
                        <div style="font-weight:600">${item.name}</div>
                    `;
                    grid.appendChild(card);
                });
            }
        });

        document.getElementById('addCardBtn').onclick = () => {
            const name = document.getElementById('siteName').value;
            const url = document.getElementById('siteUrl').value;
            if(name && url) {
                db.ref('shortcuts').push({ name, url: url.includes('://') ? url : 'https://'+url });
                document.getElementById('siteName').value = '';
                document.getElementById('siteUrl').value = '';
            }
        };

        // --- AI CHAT LOGIC ---
        const aiFab = document.getElementById('aiFab');
        const aiWindow = document.getElementById('aiWindow');
        const aiSend = document.getElementById('aiSend');
        const aiInput = document.getElementById('aiInput');
        const chatArea = document.getElementById('chatArea');

        aiFab.onclick = () => aiWindow.classList.toggle('active');
        document.getElementById('closeAi').onclick = () => aiWindow.classList.remove('active');

        async function handleAiChat() {
            const text = aiInput.value.trim();
            if (!text || !XAI_API_KEY) return;

            appendMsg(text, 'user');
            aiInput.value = '';

            // Show Thinking
            const thinking = appendMsg('<div class="spinner"></div>', 'ai');

            try {
                const response = await fetch("https://api.x.ai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${XAI_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "grok-4-1-fast-non-reasoning",
                        messages: [{ role: "system", content: "You are Ona AI on a user dashboard." }, { role: "user", content: text }]
                    })
                });

                const result = await response.json();
                thinking.remove();
                appendMsg(result.choices[0].message.content, 'ai');
            } catch (e) {
                thinking.innerHTML = "Error connecting to Grok.";
            }
        }

        function appendMsg(content, side) {
            const div = document.createElement('div');
            div.className = `bubble ${side}`;
            div.innerHTML = content;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
            return div;
        }

        aiSend.onclick = handleAiChat;
        aiInput.onkeypress = (e) => { if(e.key === 'Enter') handleAiChat(); };

        // Theme Toggle
        document.getElementById('themeToggle').onclick = () => {
            const isDark = document.body.hasAttribute('data-theme');
            isDark ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark');
        };
    </script>
</body>
</html>
